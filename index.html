<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>My LEGO Collection</title>
<style>
  :root {
    --lego-red: #D01012;
    --lego-yellow: #FFD500;
    --lego-blue: #0057A6;
    --lego-green: #009247;
    --page-bg: #f5f1e8;
    --card-bg: #ffffff;
    --text: #1f2937;
    --muted: #6b7280;
    --border: #e5e7eb;
    --shadow: 0 10px 24px rgba(0,0,0,.10);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    color: var(--text);
    background: linear-gradient(180deg, #fff7cc 0, #fff7cc 86px, var(--page-bg) 86px);
  }
  header {
    position: sticky;
    top: 0;
    z-index: 20;
    background: linear-gradient(90deg, var(--lego-red) 0 18%, var(--lego-yellow) 18% 36%, var(--lego-blue) 36% 54%, var(--lego-green) 54% 72%, var(--lego-red) 72% 100%);
    box-shadow: 0 2px 12px rgba(0,0,0,.12);
  }
  .header-inner {
    padding: 14px 18px 16px;
    background: rgba(255,255,255,.93);
    backdrop-filter: blur(4px);
  }
  h1 { margin: 0 0 8px; font-size: 1.8rem; letter-spacing: .02em; }
  .subtitle { color: var(--muted); margin-bottom: 12px; font-weight: 600; }
  .sync-note { margin-top: 8px; font-size: 13px; color: var(--muted); }
  .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: end; }
  select, input, textarea { padding: 10px 12px; border: 1px solid #cfd4dc; border-radius: 12px; background: white; font-size: 14px; font-family: inherit; }
  textarea { min-height: 140px; resize: vertical; width: 100%; }
  .button { appearance: none; border: 0; border-radius: 12px; padding: 11px 14px; font-weight: 700; cursor: pointer; background: var(--lego-blue); color: white; box-shadow: 0 4px 10px rgba(0,0,0,.12); font-size: 14px; }
  .button:disabled { opacity: 0.6; cursor: not-allowed; }
  .button.alt { background: white; color: var(--text); border: 1px solid var(--border); }
  .stats { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
  .pill { background: white; border: 1px solid var(--border); padding: 8px 12px; border-radius: 999px; font-size: 13px; font-weight: 700; }
  .layout { padding: 18px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
  .card { background: var(--card-bg); border-radius: 18px; overflow: hidden; border: 1px solid var(--border); box-shadow: var(--shadow); display: flex; flex-direction: column; min-height: 500px; transition: transform .18s ease, box-shadow .18s ease; cursor: pointer; }
  .card:hover { transform: translateY(-2px); box-shadow: 0 14px 28px rgba(0,0,0,.12); }
  .image-wrap { position: relative; background: linear-gradient(180deg, #f8fafc, #eef2f7); aspect-ratio: 4 / 3; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .image-wrap img { width: 100%; height: 100%; object-fit: contain; padding: 14px; }
  .theme-tag { position: absolute; top: 12px; left: 12px; color: white; font-size: 12px; font-weight: 700; padding: 7px 10px; border-radius: 999px; box-shadow: 0 2px 8px rgba(0,0,0,.18); }
  .status-tag { position: absolute; top: 12px; right: 12px; color: #111827; font-size: 12px; font-weight: 700; padding: 7px 10px; border-radius: 999px; background: rgba(255,255,255,.93); }
  .card-body { padding: 16px; border-top: 7px solid var(--lego-red); display: flex; flex-direction: column; gap: 10px; flex: 1; }
  .title { font-size: 1.08rem; line-height: 1.35; font-weight: 700; min-height: 3.0em; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .facts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .fact { background: #f8fafc; border: 1px solid var(--border); border-radius: 12px; padding: 10px 12px; }
  .fact-label { display: block; color: var(--muted); font-size: 12px; margin-bottom: 3px; }
  .fact-value { font-weight: 700; }
  .notes { margin-top: auto; background: #fffdf3; border: 1px dashed #e8cf6a; border-radius: 12px; padding: 10px 12px; font-size: 13px; color: #6b5b1c; min-height: 72px; white-space: pre-wrap; }
  .actions { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-top: 4px; }
  .button-link { color: var(--lego-blue); text-decoration: none; font-weight: 700; font-size: 14px; }
  .hint { color: var(--muted); font-size: 13px; }
  .empty { padding: 24px; text-align: center; color: var(--muted); }
  
  /* Modal Styles */
  .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.show { display: flex; }
  .modal-content { background: white; border-radius: 24px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.3); position: relative; }
  .modal-header { padding: 20px; background: linear-gradient(90deg, var(--lego-red), var(--lego-yellow)); display: flex; justify-content: space-between; align-items: center; }
  .modal-header h2 { margin: 0; font-size: 1.2rem; color: #111827; }
  .close-btn { background: white; border: 0; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-weight: bold; font-size: 18px; display: flex; align-items: center; justify-content: center; }
  .modal-body { padding: 20px; display: grid; gap: 16px; }
  .modal-image { width: 100%; border-radius: 14px; border: 1px solid var(--border); background: #f8fafc; padding: 10px; aspect-ratio: 4 / 3; object-fit: contain; }
  .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 700; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .grow { flex: 1 1 180px; }
  
  .status-ok { color: #0f766e; font-weight: 700; }
  .status-local { color: #92400e; font-weight: 700; }
  .status-saving { color: #1d4ed8; font-weight: 700; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: #1f2937; color: white; padding: 12px 20px; border-radius: 12px; font-size: 14px; font-weight: 700; box-shadow: 0 8px 24px rgba(0,0,0,.25); z-index: 999; opacity: 0; transform: translateY(12px); transition: opacity .25s, transform .25s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { background: #991b1b; }
  .sort-label { display: flex; flex-direction: column; gap: 4px; }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <h1>My LEGO Collection</h1>
    <div class="subtitle">Click any card to update status and notes.</div>
    <div class="sync-note" id="syncNote">Sync: <span class="status-local">connecting...</span></div>
    <div class="controls">
      <label class="sort-label">
        <div class="hint">Theme</div>
        <select id="themeFilter"></select>
      </label>
      <label class="sort-label">
        <div class="hint">Status</div>
        <select id="statusFilter">
          <option value="all">All statuses</option>
          <option value="Not started">Not started</option>
          <option value="Complete">Complete</option>
          <option value="Missing/Broken pieces">Missing/Broken pieces</option>
        </select>
      </label>
      <label class="sort-label">
        <div class="hint">Sort by</div>
        <select id="sortSelect">
          <option value="default">Default order</option>
          <option value="name">Name (A–Z)</option>
          <option value="year_asc">Year (oldest first)</option>
          <option value="year_desc">Year (newest first)</option>
          <option value="pieces_desc">Pieces (most first)</option>
          <option value="pieces_asc">Pieces (fewest first)</option>
          <option value="status">Status</option>
        </select>
      </label>
      <label class="sort-label grow">
        <div class="hint">Search</div>
        <input id="searchBox" type="text" placeholder="Search set number, name, theme..." style="width:100%;">
      </label>
    </div>
    <div class="stats">
      <div class="pill" id="countPill">110 sets</div>
      <div class="pill" id="piecesPill"></div>
      <div class="pill" id="minifigsPill"></div>
      <div class="pill" id="completePill"></div>
    </div>
  </div>
</header>

<main class="layout">
  <div class="grid" id="grid"></div>
</main>

<!-- Modal Editor -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modalTitle">Set details</h2>
      <button class="close-btn" id="closeModal">&times;</button>
    </div>
    <div class="modal-body">
      <img id="modalImage" class="modal-image" alt="" />
      <div id="modalMeta" style="font-size:14px; color:var(--muted); line-height:1.45;"></div>
      <div class="row">
        <div class="fact grow">
          <span class="fact-label">Pieces</span>
          <span class="fact-value" id="modalPieces">—</span>
        </div>
        <div class="fact grow">
          <span class="fact-label">Minifigs</span>
          <span class="fact-value" id="modalMinifigs">—</span>
        </div>
      </div>
      <div class="field">
        <label for="modalStatus">Status</label>
        <select id="modalStatus" style="width:100%;">
          <option value="Not started">Not started</option>
          <option value="Complete">Complete</option>
          <option value="Missing/Broken pieces">Missing/Broken pieces</option>
        </select>
      </div>
      <div class="field">
        <label for="modalNotes">Notes</label>
        <textarea id="modalNotes" placeholder="Missing pieces, memories, anything useful..."></textarea>
      </div>
      <div class="row">
        <button class="button" id="saveBtn" type="button" style="flex:1;">Save changes</button>
        <button class="button alt" id="clearBtn" type="button">Clear notes</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

const statusFilter = document.getElementById("statusFilter");
const sortSelect = document.getElementById("sortSelect");
const searchBox = document.getElementById("searchBox");
const countPill = document.getElementById("countPill");
const piecesPill = document.getElementById("piecesPill");
const minifigsPill = document.getElementById("minifigsPill");
const completePill = document.getElementById("completePill");
const modalOverlay = document.getElementById("modalOverlay");
const modalImage = document.getElementById("modalImage");
const modalTitle = document.getElementById("modalTitle");
const modalMeta = document.getElementById("modalMeta");
const modalPieces = document.getElementById("modalPieces");
const modalMinifigs = document.getElementById("modalMinifigs");
const modalStatus = document.getElementById("modalStatus");
const modalNotes = document.getElementById("modalNotes");
const saveBtn = document.getElementById("saveBtn");
const clearBtn = document.getElementById("clearBtn");
const closeModal = document.getElementById("closeModal");
const syncNote = document.getElementById("syncNote");
const toastEl = document.getElementById("toast");

let toastTimer;
function showToast(msg, isError = false) {
  clearTimeout(toastTimer);
  toastEl.textContent = msg;
  toastEl.className = "toast show" + (isError ? " error" : "");
  toastTimer = setTimeout(() => { toastEl.className = "toast"; }, 3000);
}

function statusBadgeColor(s) {
  if (s === "Complete") return "#bbf7d0";
  if (s === "Missing/Broken pieces") return "#fecaca";
  return "#f1f5f9";
}

function statusSortOrder(s) {
  if (s === "Missing/Broken pieces") return 0;
  if (s === "Not started") return 1;
  return 2;
}

function baseData() {
  return initialData.map(s => ({ ...s, status: "Not started", notes: "" }));
}

function mergeUpdates(base, updates) {
  return base.map(s => {
    const u = updates[s.id];
    return u ? { ...s, status: u.status || s.status, notes: u.notes !== undefined ? u.notes : s.notes } : s;
  });
}

function filteredData() {
  const theme = themeFilter.value;
  const status = statusFilter.value;
  const q = searchBox.value.trim().toLowerCase();
  const sort = sortSelect.value;
  let items = data.filter(s => {
    const matchesTheme = theme === "all" || s.theme === theme;
    const matchesStatus = status === "all" || s.status === status;
    const haystack = (s.theme + " " + s.num + " " + s.name).toLowerCase();
    const matchesSearch = !q || haystack.includes(q);
    return matchesTheme && matchesStatus && matchesSearch;
  });
  if (sort === "name") items.sort((a, b) => a.name.localeCompare(b.name));
  else if (sort === "year_asc") items.sort((a, b) => a.year - b.year);
  else if (sort === "year_desc") items.sort((a, b) => b.year - a.year);
  else if (sort === "pieces_desc") items.sort((a, b) => b.pieces - a.pieces);
  else if (sort === "pieces_asc") items.sort((a, b) => a.pieces - b.pieces);
  else if (sort === "status") items.sort((a, b) => statusSortOrder(a.status) - statusSortOrder(b.status));
  return items;
}

function updateStats(items) {
  countPill.textContent = items.length + " set" + (items.length === 1 ? "" : "s") + " shown";
  const pieces = items.reduce((sum, s) => sum + (Number(s.pieces) || 0), 0);
  const minifigs = items.reduce((sum, s) => sum + (Number(s.minifigs) || 0), 0);
  piecesPill.textContent = pieces.toLocaleString() + " pieces";
  minifigsPill.textContent = minifigs.toLocaleString() + " minifigs";
  const complete = data.filter(s => s.status === "Complete").length;
  const missing = data.filter(s => s.status === "Missing/Broken pieces").length;
  completePill.textContent = complete + " complete · " + missing + " missing/broken";
}

function renderFilters() {
  const themes = ["all", ...new Set(initialData.map(s => s.theme))].sort((a, b) => a === "all" ? -1 : b === "all" ? 1 : a.localeCompare(b));
  const current = themeFilter.value;
  themeFilter.innerHTML = themes.map(t => '<option value="' + t + '"' + (t === current ? " selected" : "") + '>' + (t === "all" ? "All themes" : t) + '</option>').join("");
}

function render() {
  const items = filteredData();
  updateStats(items);
  grid.innerHTML = "";
  if (!items.length) {
    grid.innerHTML = '<div class="empty">No sets match those filters.</div>';
    return;
  }
  items.forEach(s => {
    const card = document.createElement("article");
    card.className = "card";
    const safeNum = s.num.replace(/"/g, "&quot;");
    const safeName = s.name.replace(/</g, "&lt;").replace(/>/g, "&gt;");
    card.innerHTML = ' \
      <div class="image-wrap"> \
        <span class="theme-tag" style="background:' + s.themeColor + '">' + s.theme + '</span> \
        <span class="status-tag" style="background:' + statusBadgeColor(s.status) + '">' + s.status + '</span> \
        <img src="' + s.img + '" alt="' + safeNum + ' ' + safeName + '" loading="lazy" \
          onerror="this.style.display=\'none\'; this.parentElement.insertAdjacentHTML(\'beforeend\',\'<div style=&quot;padding:20px;text-align:center;color:#6b7280;font-weight:bold;&quot;>Image unavailable<br>' + safeNum + '</div>\');"> \
      </div> \
      <div class="card-body" style="border-top-color:' + s.themeColor + ';"> \
        <div class="title">' + s.theme + ' - ' + s.num + ' - ' + safeName + ' (' + s.year + ')</div> \
        <div class="facts"> \
          <div class="fact"> \
            <span class="fact-label">Pieces</span> \
            <span class="fact-value">' + Number(s.pieces).toLocaleString() + '</span> \
          </div> \
          <div class="fact"> \
            <span class="fact-label">Minifigs</span> \
            <span class="fact-value">' + Number(s.minifigs).toLocaleString() + '</span> \
          </div> \
        </div> \
        <div class="notes">' + (s.notes ? s.notes.replace(/</g, "&lt;").replace(/>/g, "&gt;") : '<span style="color:#9ca3af;font-style:italic;">No notes yet.</span>') + '</div> \
        <div class="actions"> \
          <a class="button-link" href="' + s.bricksetUrl + '" target="_blank" rel="noopener">View on Brickset</a> \
          <span class="hint">Click to edit</span> \
        </div> \
      </div> \
    ';
    card.addEventListener("click", (e) => { if (!e.target.closest("a")) openEditor(s.id); });
    grid.appendChild(card);
  });
}

function openEditor(id) {
  selectedId = id;
  const s = data.find(x => x.id === id);
  if (!s) return;
  modalImage.src = s.img;
  modalTitle.textContent = s.theme + " - " + s.num + " - " + s.name;
  modalMeta.textContent = s.theme + (s.subtheme ? " · " + s.subtheme : "") + " · " + s.year;
  modalPieces.textContent = Number(s.pieces).toLocaleString();
  modalMinifigs.textContent = Number(s.minifigs).toLocaleString();
  modalStatus.value = s.status || "Not started";
  modalNotes.value = s.notes || "";
  modalOverlay.classList.add("show");
  document.body.style.overflow = "hidden";
}

function closeEditor() {
  modalOverlay.classList.remove("show");
  document.body.style.overflow = "auto";
  selectedId = null;
}

async function loadFromSheets() {
  syncNote.innerHTML = "Sync: " + '<span class="status-saving">loading...</span>';
  try {
    const res = await fetch(SCRIPT_URL + "?action=get");
    const updates = await res.json();
    data = mergeUpdates(baseData(), updates);
    syncNote.innerHTML = "Sync: " + '<span class="status-ok">active ✓</span>';
    renderFilters();
    render();
  } catch (err) {
    console.error("Load error:", err);
    syncNote.innerHTML = "Sync: " + '<span class="status-local">offline</span>';
    data = baseData();
    renderFilters();
    render();
  }
}

async function saveToSheets(id, status, notes) {
  saving = true;
  saveBtn.disabled = true;
  saveBtn.textContent = "Saving...";
  syncNote.innerHTML = "Sync: " + '<span class="status-saving">saving...</span>';
  try {
    const body = new URLSearchParams({ action: "set", id, status, notes });
    const res = await fetch(SCRIPT_URL, { method: "POST", body });
    const json = await res.json();
    if (json.ok) {
      const s = data.find(x => x.id === id);
      if (s) { s.status = status; s.notes = notes; }
      render();
      syncNote.innerHTML = "Sync: " + '<span class="status-ok">active ✓</span>';
      showToast("Saved! ✓");
      closeEditor();
    } else { throw new Error(json.error); }
  } catch (err) {
    console.error("Save error:", err);
    syncNote.innerHTML = "Sync: " + '<span class="status-local">failed</span>';
    showToast("Save failed.", true);
  } finally {
    saving = false;
    saveBtn.disabled = false;
    saveBtn.textContent = "Save changes";
  }
}

saveBtn.addEventListener("click", () => { if (selectedId && !saving) saveToSheets(selectedId, modalStatus.value, modalNotes.value); });
clearBtn.addEventListener("click", () => { modalNotes.value = ""; });
closeModal.addEventListener("click", closeEditor);
modalOverlay.addEventListener("click", (e) => { if (e.target === modalOverlay) closeEditor(); });
themeFilter.addEventListener("change", render);
statusFilter.addEventListener("change", render);
sortSelect.addEventListener("change", render);
searchBox.addEventListener("input", render);

renderFilters();
loadFromSheets();
</script>
</body>
</html>
